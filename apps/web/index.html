<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mazing Bolao</title>
    <script>
      const theme = localStorage.getItem("mazing-bolao-theme");
      const safeTheme = ["light", "dark", "canarinho"].includes(theme) ? theme : "light";
      document.documentElement.classList.add(safeTheme);
      document.documentElement.dataset.theme = safeTheme;
    </script>
    <script src="/env.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
